[package]
name = "kami-markdown-viewer"
version = "0.1.3"
description = "A Kami-inspired Markdown viewer for Windows"
authors = ["Kami Markdown Viewer"]
edition = "2021"

[lib]
name = "kami_markdown_viewer_lib"
crate-type = ["rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
base64 = "0.22"
dunce = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-opener = "2"
tauri-plugin-store = "2"
urlencoding = "2"

[profile.release]
lto = true
codegen-units = 1
